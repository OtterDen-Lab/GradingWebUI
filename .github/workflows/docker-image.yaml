name: Build and publish Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish (for example v0.9.5)
        required: false
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Compute publish tags
        id: publish_tags
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          VERSION=""

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [ -n "$VERSION" ]; then
            case "$VERSION" in
              v*) ;;
              *) VERSION="v$VERSION" ;;
            esac
            TAGS="${IMAGE}:${VERSION}
${IMAGE}:latest
${IMAGE}:sha-${GITHUB_SHA}"
          else
            TAGS="${IMAGE}:sha-${GITHUB_SHA}"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web-grading/Dockerfile
          push: true
          tags: ${{ steps.publish_tags.outputs.tags }}
