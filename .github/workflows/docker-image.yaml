name: Build and publish Docker image

on:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Manual-only notice
        run: |
          echo "Docker publishing is intentionally manual."
          echo "Use 'make publish' locally to build and push Docker Hub images."
